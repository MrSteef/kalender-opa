name: Build and Deploy

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      reset_database:
        description: "Reset SQLite database and redeploy"
        required: false
        type: boolean
        default: false

env:
  SSH_PORT: "22"

jobs:
  build:
    if: github.ref_name == github.event.repository.default_branch && (github.event_name != 'workflow_dispatch' || inputs.reset_database != true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  deploy_app:
    if: github.ref_name == github.event.repository.default_branch && (github.event_name != 'workflow_dispatch' || inputs.reset_database != true)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${{ env.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote deploy dir exists and stop old container
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            mkdir -p '${{ secrets.DEPLOY_DIR }}';
            cd '${{ secrets.DEPLOY_DIR }}';
            if [ -f docker-compose.yml ]; then
              docker compose down --remove-orphans || true;
            fi
          "

      - name: Sync repository to remote server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.idea' \
            --exclude '.dart_tool' \
            --exclude 'build' \
            --exclude 'android' \
            --exclude 'ios' \
            --exclude 'linux' \
            --exclude 'macos' \
            --exclude 'windows' \
            --exclude 'backend/node_modules' \
            --exclude 'node_modules' \
            -e "ssh -p ${{ env.SSH_PORT }}" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_DIR }}/"

      - name: Build and restart Docker container on server
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            set -euo pipefail
            cd '${{ secrets.DEPLOY_DIR }}'
            cat > .env <<'EOF'
            NODE_ENV=production
            PORT=${{ secrets.PORT }}
            APP_BASE_URL=${{ secrets.APP_BASE_URL }}
            STATE_SECRET=${{ secrets.STATE_SECRET }}
            SESSION_COOKIE_NAME=${{ secrets.SESSION_COOKIE_NAME }}
            SESSION_COOKIE_MAX_AGE_DAYS=${{ secrets.SESSION_COOKIE_MAX_AGE_DAYS }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALENDAR_ID=${{ secrets.GOOGLE_CALENDAR_ID }}
            DISPLAY_TIME_ZONE=${{ secrets.DISPLAY_TIME_ZONE }}
            DISPLAY_LOCALE=${{ secrets.DISPLAY_LOCALE }}
            DISPLAY_DAYS_PAST=${{ secrets.DISPLAY_DAYS_PAST }}
            DISPLAY_DAYS_FUTURE=${{ secrets.DISPLAY_DAYS_FUTURE }}
            MAX_TIMED_EVENTS=${{ secrets.MAX_TIMED_EVENTS }}
            MAX_ALL_DAY_EVENTS=${{ secrets.MAX_ALL_DAY_EVENTS }}
            SYNC_INTERVAL_MS=${{ secrets.SYNC_INTERVAL_MS }}
            VITE_ALLOWED_HOSTS=${{ secrets.VITE_ALLOWED_HOSTS }}
            DATABASE_PATH=${{ secrets.DATABASE_PATH }}
            EOF
            docker compose up -d --build --remove-orphans
          "

  reset_database:
    if: github.event_name == 'workflow_dispatch' && inputs.reset_database == true && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${{ env.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Reset SQLite and restart app
        run: |
          ssh -p "${{ env.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            set -euo pipefail
            cd '${{ secrets.DEPLOY_DIR }}'
            docker compose up -d kalender-opa
            docker compose exec -T kalender-opa sh -lc 'rm -f /data/kalender-opa.sqlite'
            docker compose up -d --build --remove-orphans kalender-opa
          "
